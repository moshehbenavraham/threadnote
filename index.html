    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!--
      Anti-FOUC theme bootstrap. Runs synchronously before paint so the
      correct `.dark` class is set on <html> without a flash. Pairs with
      the next-themes <ThemeProvider> wrapping <App> in src/App.tsx.
      Keep this in sync with ThemeProvider's `defaultTheme="system"`.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark =
            stored === "dark" || ((stored === null || stored === "system") && prefersDark);
          var root = document.documentElement;
          if (isDark) root.classList.add("dark");
          root.style.colorScheme = isDark ? "dark" : "light";
        } catch (_) {
          /* no-op: localStorage / matchMedia unavailable */
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 2rem; font-family: system-ui, sans-serif; text-align: center;">

    </noscript>
